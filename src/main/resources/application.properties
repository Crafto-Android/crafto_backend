spring.application.name=crafto-backend
server.port=8085
spring.data.mongodb.uri=${MONGODB_CONNECTION}
spring.data.mongodb.database=crafto_db

# Firebase Configuration
firebase.storage.bucket=crafto-33c46.firebasestorage.app
firebase.config.path=firebase-service-account.json

# File Upload Configuration
spring.servlet.multipart.max-file-size=4MB
# NOSONAR - Required for craftsman verification documents (authenticated endpoints only)
spring.servlet.multipart.max-request-size=16MB